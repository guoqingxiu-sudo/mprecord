name: Deploy To GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build Artifact
        run: |
          mkdir -p dist
          cp index.html dist/
          cp styles.css dist/
          cp app.js dist/
          cp manifest.webmanifest dist/
          cp sw.js dist/
          cp icon.svg dist/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy To GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
